<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tic-Tac-Toe</title>

    <!-- Needed so PyScript worker input() can work on static hosts like GitHub Pages -->
    <script>
        window.coi = {
            quiet: true,
            coepCredentialless: () => true
        };
    </script>
    <script src="./coi-serviceworker.min.js"></script>

    <link rel="stylesheet" href="https://pyscript.net/releases/2026.3.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2026.3.1/core.js"></script>

    <style>
        :root {
            --bg1: #04070d;
            --bg2: #07111f;
            --bg3: #02050b;
            --panel: rgba(7, 11, 20, 0.72);
            --panel-strong: rgba(5, 8, 16, 0.86);
            --terminal: rgba(7, 10, 14, 0.96);
            --green: #2ed573;
            --cyan: #70e1f5;
            --pink: #ff6ec7;
            --purple: #8b7cff;
            --text: #f8fff9;
            --border: rgba(112, 225, 245, 0.18);
            --shadow: 0 30px 100px rgba(0, 0, 0, 0.52);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            color: var(--text);
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
            background:
                radial-gradient(circle at 15% 20%, rgba(112, 225, 245, 0.16), transparent 28%),
                radial-gradient(circle at 85% 18%, rgba(255, 110, 199, 0.12), transparent 26%),
                radial-gradient(circle at 50% 85%, rgba(46, 213, 115, 0.11), transparent 32%),
                linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 50%, var(--bg3) 100%);
            overflow-x: hidden;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            inset: -20%;
            pointer-events: none;
            z-index: 0;
            filter: blur(70px);
            opacity: 0.55;
        }

        body::before {
            background:
                radial-gradient(circle at 20% 30%, rgba(112, 225, 245, 0.28), transparent 18%),
                radial-gradient(circle at 70% 25%, rgba(139, 124, 255, 0.24), transparent 18%),
                radial-gradient(circle at 55% 75%, rgba(46, 213, 115, 0.22), transparent 18%);
            animation: driftOne 16s ease-in-out infinite alternate;
        }

        body::after {
            background:
                radial-gradient(circle at 80% 35%, rgba(255, 110, 199, 0.20), transparent 16%),
                radial-gradient(circle at 28% 78%, rgba(112, 225, 245, 0.18), transparent 18%),
                radial-gradient(circle at 60% 10%, rgba(46, 213, 115, 0.12), transparent 16%);
            animation: driftTwo 20s ease-in-out infinite alternate;
        }

        .grid-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.018) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.018) 1px, transparent 1px);
            background-size: 42px 42px;
            mask-image: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
        }

        .page {
            position: relative;
            z-index: 1;
            width: min(1080px, calc(100% - 28px));
            margin: 0 auto;
            padding: 22px 0 30px;
        }

        .header {
            position: relative;
            margin-bottom: 18px;
            padding: clamp(22px, 4vw, 36px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 30px;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02)),
                var(--panel);
            box-shadow:
                0 0 0 1px rgba(112, 225, 245, 0.06) inset,
                0 0 40px rgba(112, 225, 245, 0.05),
                0 0 80px rgba(255, 110, 199, 0.04),
                var(--shadow);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            text-align: center;
            overflow: hidden;
        }

        .header::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(120deg,
                    transparent 0%,
                    rgba(112, 225, 245, 0.08) 25%,
                    transparent 50%,
                    rgba(255, 110, 199, 0.06) 75%,
                    transparent 100%);
            transform: translateX(-30%);
            animation: shimmer 8s linear infinite;
            pointer-events: none;
        }

        h1 {
            position: relative;
            margin: 0;
            font-size: clamp(2.8rem, 11vw, 7.5rem);
            line-height: 0.86;
            letter-spacing: -0.1em;
            text-transform: lowercase;
            font-weight: 950;
            background: linear-gradient(
                90deg,
                var(--green) 0%,
                var(--cyan) 35%,
                var(--purple) 65%,
                var(--pink) 100%
            );
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow:
                0 0 18px rgba(112, 225, 245, 0.12),
                0 0 30px rgba(255, 110, 199, 0.08);
        }

        .terminal-shell {
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 30px;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.015)),
                var(--panel-strong);
            box-shadow:
                0 0 0 1px rgba(46, 213, 115, 0.05) inset,
                0 0 30px rgba(46, 213, 115, 0.04),
                var(--shadow);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }

        .terminal-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 14px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            background:
                linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.015)),
                rgba(0, 0, 0, 0.22);
        }

        .dot {
            width: 11px;
            height: 11px;
            border-radius: 999px;
            box-shadow: 0 0 12px currentColor;
        }

        .dot:nth-child(1) {
            background: var(--green);
            color: var(--green);
        }

        .dot:nth-child(2) {
            background: var(--cyan);
            color: var(--cyan);
        }

        .dot:nth-child(3) {
            background: var(--pink);
            color: var(--pink);
        }

        .terminal-wrap {
            overflow-x: auto;
            background:
                linear-gradient(rgba(46, 213, 115, 0.028) 50%, transparent 50%),
                linear-gradient(90deg, rgba(112, 225, 245, 0.02), transparent 25%, transparent 75%, rgba(255, 110, 199, 0.02)),
                var(--terminal);
            background-size: 100% 4px, 100% 100%, 100% 100%;
        }

        .terminal-area {
            min-width: 740px;
            min-height: 570px;
            padding: 16px;
        }

        script[type="py"],
        script[type="mpy"] {
            display: none !important;
        }

        .terminal-area pyscript-terminal,
        .terminal-area .py-terminal,
        .terminal-area .xterm {
            width: 100%;
        }

        .terminal-area .xterm {
            min-height: 535px;
            font-size: clamp(13px, 1.5vw, 16px);
            line-height: 1.25;
        }

        .terminal-area .xterm-viewport,
        .terminal-area .xterm-screen {
            background: transparent !important;
        }

        @keyframes driftOne {
            0% {
                transform: translate3d(0, 0, 0) scale(1);
            }
            100% {
                transform: translate3d(3%, -2%, 0) scale(1.08);
            }
        }

        @keyframes driftTwo {
            0% {
                transform: translate3d(0, 0, 0) scale(1);
            }
            100% {
                transform: translate3d(-3%, 2%, 0) scale(1.1);
            }
        }

        @keyframes shimmer {
            0% {
                transform: translateX(-35%);
            }
            100% {
                transform: translateX(35%);
            }
        }

        @media (max-width: 760px) {
            .page {
                width: min(100% - 16px, 1080px);
                padding-top: 12px;
            }

            .header,
            .terminal-shell {
                border-radius: 22px;
            }

            .terminal-bar {
                padding: 12px 14px;
            }

            .terminal-area {
                min-width: 660px;
                min-height: 520px;
                padding: 12px;
            }

            .terminal-area .xterm {
                min-height: 490px;
                font-size: 13px;
            }
        }
    </style>
</head>

<body>
    <div class="grid-overlay"></div>

    <main class="page">
        <header class="header">
            <h1>tic-tac-toe</h1>
        </header>

        <section class="terminal-shell">
            <div class="terminal-bar" aria-hidden="true">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>

            <div class="terminal-wrap">
                <div class="terminal-area">
                    <script type="mpy" src="./main.py" terminal worker></script>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
